name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Pinned Bun version. Release notes: https://github.com/oven-sh/bun/releases/tag/bun-v1.2.4
          bun-version: 1.2.4

      - name: Verify Bun Version
        run: bun scripts/check-bun-version.ts

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package entry points exist
        run: node scripts/verify-exports.js

      - name: Validate package with npm pack
        run: npm pack --dry-run

      - name: Run TypeScript typecheck
        run: bunx tsc --noEmit
        env:
          CI: 'true'

      - name: Run Vitest suite
        run: bun run test
        env:
          CI: 'true'

      - name: Validate environment configuration
        run: bun run validate:env
