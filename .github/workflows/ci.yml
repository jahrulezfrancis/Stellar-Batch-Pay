name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package entry points exist
        run: node scripts/verify-exports.js

      - name: Validate package with npm pack
        run: npm pack --dry-run

      - name: Run TypeScript typecheck
        run: bunx tsc --noEmit
        env:
          CI: 'true'

      - name: Run Vitest suite
        run: bun run test
        env:
          CI: 'true'

  build:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build Next.js application
        run: bun run build
        env:
          CI: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
          ALLOW_SERVER_SIGNING: 'false'
          SECRET_BACKEND: env

